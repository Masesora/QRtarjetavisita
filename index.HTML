<style>
  body{
    margin:0;
    background:#0F1A35;
    font-family:'Cormorant Garamond', serif;
  }

  /* ─────────────────────────────────────────────── */
  /* OLA ANIMADA                                     */
  /* ─────────────────────────────────────────────── */

  #screen-wave{
    width:100%;
    padding-top:60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .wave-subtitle{
    font-size:20pt;
    font-weight:300;
    font-style:italic;
    color:rgba(232,201,106,0.75);
    letter-spacing:0.12em;
    margin-top:22px;
    animation:fadeUp 1s ease-out 1.2s forwards;
    opacity:0;
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* ── ANIMACIONES OLA ── */
  @keyframes waveDraw{
    0%{stroke-dashoffset:400; opacity:0.3;}
    40%{opacity:1;}
    100%{stroke-dashoffset:0; opacity:0.85;}
  }
  @keyframes waveDrawEco{
    0%{stroke-dashoffset:380; opacity:0;}
    30%{opacity:0.18;}
    100%{stroke-dashoffset:0; opacity:0.18;}
  }
  @keyframes pulseOrigin{
    0%,100%{r:5; opacity:0.8;}
    50%{r:7; opacity:1;}
  }
  @keyframes pulseImpulse{
    0%,100%{r:4; opacity:0.65;}
    50%{r:6; opacity:0.9;}
  }
  @keyframes riseImpulse{
    0%{stroke-dashoffset:80; opacity:0;}
    60%{opacity:0;}
    100%{stroke-dashoffset:0; opacity:0.75;}
  }
  @keyframes floatWave{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-6px);}
  }

  .wave-group{
    animation:floatWave 4s ease-in-out infinite;
    transform-origin:80px 80px;
  }

  .wave-glow{
    filter:drop-shadow(0 0 30px rgba(232,201,106,0.3));
    opacity:0; animation:fadeUp 0.8s ease-out 0.2s forwards;
  }

  /* ─────────────────────────────────────────────── */
  /* BOTONES DORADOS                                 */
  /* ─────────────────────────────────────────────── */

  .options-block{
    margin-top:40px;
    text-align:center;
    padding:0 20px;
  }

  .options-block h1{
    color:white;
    font-size:26pt;
    font-weight:400;
    margin-bottom:25px;
  }

  .gold-button{
    display:block;
    background:linear-gradient(135deg, #E8C96A, #C8A84B, #9A7E3A);
    padding:14px 20px;
    margin:12px auto;
    width:85%;
    max-width:340px;
    border-radius:8px;
    color:#0F1A35;
    font-weight:500;
    text-decoration:none;
    font-size:16pt;
    letter-spacing:0.5px;
    text-align:center;
    box-shadow:0 0 12px rgba(232,201,106,0.35);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }

  .gold-button:hover{
    transform:scale(1.04);
    box-shadow:0 0 18px rgba(232,201,106,0.55);
  }

</style>
</head>

<body>

<!-- ─────────────────────────────────────────────── -->
<!-- OLA ANIMADA                                     -->
<!-- ─────────────────────────────────────────────── -->

<div id="screen-wave">

  <svg width="180" height="180" viewBox="0 0 100 100" class="wave-glow">
    <g class="wave-group">

      <!-- OLA PRINCIPAL -->
      <path d="M 10,78 C 10,78 13,22 24,22 C 35,22 38,58 50,58 C 62,58 65,22 76,22 C 87,22 89,78 89,78"
        fill="none" stroke="url(#gold)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="400"
        style="animation:waveDraw 2.6s ease forwards"/>

      <!-- OLA ECO -->
      <path d="M 13,82 C 13,82 16,26 26,26 C 36,26 39,62 50,62 C 61,62 64,26 74,26 C 84,26 86,82 86,82"
        fill="none" stroke="url(#gold)" stroke-width="1.3"
        stroke-linecap="round" opacity="0.18"
        stroke-dasharray="380"
        style="animation:waveDrawEco 3.2s ease forwards"/>

      <!-- ORIGEN -->
      <circle cx="10" cy="78" r="5"
        fill="url(#gold)"
        style="animation:pulseOrigin 2.8s ease-in-out infinite"/>

      <!-- IMPULSO -->
      <circle cx="92" cy="11" r="4"
        fill="url(#gold)"
        style="animation:pulseImpulse 2.8s ease-in-out infinite"/>

      <!-- LÍNEA IMPULSO -->
      <line x1="89" y1="78" x2="92" y2="14"
        stroke="url(#gold)" stroke-width="2.5"
        stroke-linecap="round" stroke-dasharray="80"
        style="animation:riseImpulse 2.4s ease forwards"/>
    </g>

    <!-- GRADIENTE DORADO -->
    <defs>
      <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#9A7E3A"/>
        <stop offset="50%"  stop-color="#E8C96A"/>
        <stop offset="100%" stop-color="#C8A84B"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="wave-subtitle">Dinamismo Empresarial</div>

</div>
